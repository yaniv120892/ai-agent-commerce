name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run prettier
      - run: npm run lint
      # src/lib/env.ts parses process.env at module scope, and the route
      # handlers pull it into the build, so the build needs values present
      # rather than real ones.
      - run: npm run build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          OPENAI_API_KEY: build-placeholder

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ai_commerce
          POSTGRES_PASSWORD: ai_commerce_local
          POSTGRES_DB: ai_commerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # catalog-cache.integration.test.ts asserts against a real Redis.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ai_commerce:ai_commerce_local@localhost:5432/ai_commerce_test
      TEST_DATABASE_URL: postgresql://ai_commerce:ai_commerce_local@localhost:5432/ai_commerce_test
      OPENAI_API_KEY: test-key
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate:deploy
      - run: npm run test:unit
      - run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ai_commerce
          POSTGRES_PASSWORD: ai_commerce_local
          POSTGRES_DB: ai_commerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ai_commerce:ai_commerce_local@localhost:5432/ai_commerce_test
      TEST_DATABASE_URL: postgresql://ai_commerce:ai_commerce_local@localhost:5432/ai_commerce_test
      OPENAI_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run db:migrate:deploy
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
