name: eval-gate

on:
  pull_request:
  workflow_dispatch:

# A workflow skipped by a paths filter never reports, so a required check would
# sit pending forever and block the merge. This job always runs and always
# reports; only the step that spends money is conditional.
jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            planner:
              - 'src/domain/chat/openai-model-client.ts'
              - 'src/domain/chat/active-context.ts'
              - 'src/domain/catalog/catalog-resolver.ts'
              - 'src/domain/catalog/allowed-category-slugs.ts'
              - 'src/domain/catalog/types.ts'
              - 'src/domain/testing/**'
              - 'src/lib/openai-model-config.ts'
              - 'tests/evals/**'
              - 'scripts/eval-*.ts'
              - '.github/workflows/eval-gate.yml'

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Deterministic and free, so it guards every pull request.
      - name: Run offline evaluation
        run: npm run eval:offline

      # The only suite that exercises the real planner, so it guards the
      # changes that can break the planner. Bounded by the spend cap in
      # tests/evals/eval-config.json.
      - name: Run online evaluation
        if: steps.changes.outputs.planner == 'true'
        run: npm run eval:online
        env:
          RUN_ONLINE_EVAL: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: artifacts/evaluations/
          if-no-files-found: ignore
