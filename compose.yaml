services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ai_commerce
      POSTGRES_USER: ai_commerce
      POSTGRES_PASSWORD: ai_commerce_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/001-create-test-database.sql:/docker-entrypoint-initdb.d/001-create-test-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_commerce -d ai_commerce"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
